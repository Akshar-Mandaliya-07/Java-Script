<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Text</title>
</head>
<body>
    <h1 id="heading" style="font-family: 'Courier New', Courier, monospace;">Akshar</h1>
    <button onclick="changeText()">Submit</button>
</body>
<script>
    function changeText(){
        document.getElementById("heading").innerHTML = "Akshar Mandaliya"
    }
</script>
</html>
