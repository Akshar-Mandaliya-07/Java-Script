<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Element</title>
</head>
<body style="background-color: #212121; color: aliceblue;">

</body>
<script>
    // Create div tag
    const div = document.createElement("div")
    console.log(div)
    div.id = "MyId"
    div.className = "MyClass"
    div.title = "MyDiv"
    div.innerText = "Akshar Mandaliya"
    div.style.marginTop = "30px"
    div.style.fontSize = "30px"
    // div.style.backgroundColor = "red"
    document.body.appendChild(div)


    // Create Heading Tag h1
    const headingTag = document.createElement('h1')
    console.log(headingTag)
    headingTag.id = "MyHeading"
    headingTag.className = "MyHeadingClass"
    headingTag.innerText = "Akshar Mandaliya"
    document.body.appendChild(headingTag)

   
</script>
</html>
