<!DOCTYPE html>
<html lang="en">

<head>
          <meta charset="UTF-8">
          <meta name="viewport" content="width=device-width, initial-scale=1.0">
          <title>Try Catch Block</title>
</head>

<body>
</body>
<script>
          
          try{
            const age = prompt("Enter Your Age")
            if(age < 18){
                throw new Error("Age is Not Valid")
            }
            else{
                console.log("Age is Valid");
                
            }
          }
          catch(error){
            console.log("Error Catch Success..");
            
          }
          
</script>

</html>
