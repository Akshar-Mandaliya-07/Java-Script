<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .bg{
            color: red;
            font-size: 30px;
            font-family: 'Courier New', Courier, monospace;
            margin-left: 40px;
        }
    </style>
</head>
<body style="background-color: #232f3e;">
    <button class="bg" onclick="createCookie()">Create Cookie</button>
    <button class="bg" onclick="readCookie()">Read Cookie</button>
    <button class="bg" onclick="updateCookie()">Update Cookie</button>
</body>
<script>
    function createCookie(){
        document.cookie = "username : Akshar Mandaliya"
        alert("Cookie Crated")
    }
    function readCookie(){
        alert(document.cookie)
    }
    function updateCookie(){
        document.cookie = "username : Akshar"
        alert(document.cookie)
    }
</script>
</html>
